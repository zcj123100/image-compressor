<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线图片压缩工具 - 免费无损压缩JPG/PNG/WebP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, #4b6cb7 0%, #182848 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #666;
            font-weight: 400;
            max-width: 600px;
            margin: 0 auto;
        }

        .main-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 40px;
            margin-bottom: 40px;
            width: 100%;
        }

        .upload-area {
            border: 3px dashed #4b6cb7;
            border-radius: 16px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 40px;
            background: #f8faff;
            position: relative;
        }

        .upload-area:hover, .upload-area.dragover {
            background: #eef2ff;
            border-color: #182848;
        }

        .upload-icon {
            font-size: 4rem;
            color: #4b6cb7;
            margin-bottom: 20px;
        }

        .upload-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #182848;
        }

        .upload-text {
            font-size: 1rem;
            color: #666;
            margin-bottom: 20px;
        }

        .file-input {
            display: none;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(90deg, #4b6cb7 0%, #182848 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(75, 108, 183, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(75, 108, 183, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .controls {
            margin-bottom: 40px;
        }

        .control-group {
            margin-bottom: 30px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: 600;
            color: #182848;
            font-size: 1.1rem;
        }

        .quality-value {
            font-weight: 700;
            color: #4b6cb7;
        }

        .slider-container {
            position: relative;
            height: 24px;
        }

        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: linear-gradient(90deg, #4b6cb7 0%, #182848 100%);
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            border: 3px solid #4b6cb7;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            border: 3px solid #4b6cb7;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .preview-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .preview-section {
                grid-template-columns: 1fr;
            }
        }

        .preview-card {
            background: #f8faff;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        .preview-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #182848;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .preview-img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            background: white;
            padding: 10px;
        }

        .file-info {
            font-size: 1rem;
            color: #555;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }

        .file-size {
            font-weight: 700;
            color: #182848;
        }

        .download-section {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #f8faff 0%, #eef2ff 100%);
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .download-btn {
            font-size: 1.3rem;
            padding: 18px 45px;
            background: linear-gradient(90deg, #2ecc71 0%, #27ae60 100%);
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3);
        }

        .download-btn:hover {
            box-shadow: 0 12px 25px rgba(46, 204, 113, 0.4);
        }

        .download-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .ads-section {
            width: 100%;
            margin: 40px 0;
            text-align: center;
            min-height:100px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 2px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            color:#888;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 1rem;
            width: 100%;
            margin-top: auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        .footer-text {
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.7;
        }

        .note {
            font-size: 0.9rem;
            color: #888;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .hidden {
            display: none;
        }

        .loading {
            position: relative;
            pointer-events: none;
            opacity: 0.7;
        }

        .loading::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 30px;
            margin: -15px 0 0 -15px;
            border: 3px solid #4b6cb7;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .format-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .badge {
            background: #eef2ff;
            color: #4b6cb7;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 2px solid #4b6cb7;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>在线图片压缩工具</h1>
            <p class="subtitle">免费在线图片压缩，支持JPG、PNG、WebP，无损压缩，无需注册</p>
            <div class="format-badges">
                <div class="badge">JPG</div>
                <div class="badge">PNG</div>
                <div class="badge">WebP</div>
            </div>
        </header>

        <div class="ads-section">
            此处放置百度联盟广告位
        </div>

        <div class="main-card">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">
                    <i class="fas fa-cloud-upload-alt"></i>
                </div>
                <h2 class="upload-title">拖拽图片到这里</h2>
                <p class="upload-text">或者点击按钮选择文件</p>
                <p class="upload-text">支持 JPG、PNG、WebP，单张最大10MB</p>
                <button class="btn" id="selectBtn">选择图片</button>
                <input type="file" id="fileInput" class="file-input" accept="image/jpeg,image/png,image/webp">
            </div>

            <div class="controls">
                <div class="control-group">
                    <div class="control-label">
                        <span>压缩质量</span>
                        <span class="quality-value" id="qualityValue">80%</span>
                    </div>
                    <div class="slider-container">
                        <input type="range" min="1" max="100" value="80" class="slider" id="qualitySlider">
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.9rem; color: #888; margin-top: 8px;">
                        <span>更小体积</span>
                        <span>更高画质</span>
                    </div>
                </div>
            </div>

            <div class="preview-section">
                <div class="preview-card">
                    <h3 class="preview-title"><i class="fas fa-image"></i> 原始图片</h3>
                    <div class="preview-container">
                        <img id="originalPreview" class="preview-img hidden" alt="原图预览">
                        <div id="originalPlaceholder" class="preview-img" style="display: flex; align-items: center; justify-content: center; color: #999; font-size: 1rem;">
                            尚未选择图片
                        </div>
                    </div>
                    <div class="file-info">
                        文件大小：<span class="file-size" id="originalSize">0 KB</span>
                    </div>
                </div>

                <div class="preview-card">
                    <h3 class="preview-title"><i class="fas fa-compress-alt"></i> 压缩后</h3>
                    <div class="preview-container">
                        <img id="compressedPreview" class="preview-img hidden" alt="压缩预览">
                        <div id="compressedPlaceholder" class="preview-img" style="display: flex; align-items: center; justify-content: center; color: #999; font-size: 1rem;">
                            等待压缩...
                        </div>
                    </div>
                    <div class="file-info">
                        文件大小：<span class="file-size" id="compressedSize">0 KB</span>
                        <div style="margin-top: 8px; font-size: 0.9rem; color: #4b6cb7;" id="savingsText"></div>
                    </div>
                </div>
            </div>

            <div class="download-section">
                <button class="btn download-btn" id="downloadBtn" disabled>
                    <i class="fas fa-download"></i> 下载压缩后的图片
                </button>
                <p style="margin-top: 15px; color: #666; font-size: 0.95rem;">
                    所有处理在本地浏览器完成，图片不会上传到服务器
                </p>
            </div>
        </div>

        <div class="ads-section">
            此处放置百度联盟广告位
        </div>

        <footer>
            <p class="footer-text">
                <strong>在线图片压缩工具 - 免费永久使用</strong><br>
                适合电商主图、头像、网页图片、证件照等场景
            </p>
            <p class="note">
                © 2026 在线图片压缩工具 版权所有
            </p>
        </footer>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const selectBtn = document.getElementById('selectBtn');
        const qualitySlider = document.getElementById('qualitySlider');
        const qualityValue = document.getElementById('qualityValue');
        const originalPreview = document.getElementById('originalPreview');
        const compressedPreview = document.getElementById('compressedPreview');
        const originalPlaceholder = document.getElementById('originalPlaceholder');
        const compressedPlaceholder = document.getElementById('compressedPlaceholder');
        const originalSize = document.getElementById('originalSize');
        const compressedSize = document.getElementById('compressedSize');
        const savingsText = document.getElementById('savingsText');
        const downloadBtn = document.getElementById('downloadBtn');

        let originalImage = null;
        let originalBlob = null;
        let compressedBlob = null;
        let currentQuality = 80;

        selectBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFileSelect);
        qualitySlider.addEventListener('input', updateQuality);
        downloadBtn.addEventListener('click', downloadCompressedImage);

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        function handleFileSelect(e) {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        }

        function handleFile(file) {
            const validTypes = ['image/jpeg', 'image/png', 'image/webp'];
            if (!validTypes.includes(file.type)) {
                alert('请选择有效的图片文件（JPG、PNG、WebP）');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                alert('文件不能超过10MB');
                return;
            }

            originalImage = null;
            originalBlob = null;
            compressedBlob = null;
            originalSize.textContent = formatFileSize(file.size);
            originalBlob = file;

            const reader = new FileReader();
            reader.onload = function(e) {
                originalImage = new Image();
                originalImage.onload = function() {
                    originalPreview.src = e.target.result;
                    originalPreview.classList.remove('hidden');
                    originalPlaceholder.style.display = 'none';
                    compressImage();
                };
                originalImage.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function updateQuality() {
            currentQuality = parseInt(qualitySlider.value);
            qualityValue.textContent = `${currentQuality}%`;
            if (originalImage) compressImage();
        }

        function compressImage() {
            if (!originalImage) return;

            compressedPreview.classList.add('hidden');
            compressedPlaceholder.style.display = 'flex';
            compressedPlaceholder.innerHTML = '<div class="loading"></div>';
            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 正在压缩...';

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            let width = originalImage.width;
            let height = originalImage.height;
            const maxWidth = 800;

            if (width > maxWidth) {
                height = (maxWidth / width) * height;
                width = maxWidth;
            }

            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(originalImage, 0, 0, width, height);

            canvas.toBlob((blob) => {
                compressedBlob = blob;
                compressedSize.textContent = formatFileSize(blob.size);
                const saved = ((originalBlob.size - blob.size) / originalBlob.size * 100).toFixed(1);

                if (blob.size < originalBlob.size) {
                    savingsText.textContent = `已节省 ${saved}%`;
                    savingsText.style.color = '#2ecc71';
                } else {
                    savingsText.textContent = `体积增加 ${Math.abs(saved)}%`;
                    savingsText.style.color = '#e74c3c';
                }

                const u = URL.createObjectURL(blob);
                compressedPreview.src = u;
                compressedPreview.classList.remove('hidden');
                compressedPlaceholder.style.display = 'none';
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<i class="fas fa-download"></i> 下载压缩图片';
            }, originalBlob.type, currentQuality / 100);
        }

        function downloadCompressedImage() {
            if (!compressedBlob) return;
            const a = document.createElement('a');
            const u = URL.createObjectURL(compressedBlob);
            a.href = u;
            const name = fileInput.files[0]?.name || 'image';
            const n = name.replace(/\.[^/.]+$/, "");
            const ext = originalBlob.type.split('/')[1];
            a.download = `${n}_compressed.${ext}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(u), 100);
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const s = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + s[i];
        }

        updateQuality();
    </script>
</body>
</html>
